body { font-family:'Inter',sans-serif; background:#0a0a0a; color:#fff; margin:0; overflow-x:hidden; }
canvas { image-rendering:crisp-edges; }
.stadium-glow { box-shadow:0 0 50px rgba(34,197,94,0.2); }
@keyframes pulse-slow { 0%,100%{opacity:.8} 50%{opacity:1} }
.animate-pulse-slow { animation:pulse-slow 3s infinite; }
@keyframes goalFlash { 0%{box-shadow:0 0 0 0 rgba(250,204,21,0.9)} 100%{box-shadow:0 0 80px 30px rgba(250,204,21,0)} }
.goal-flash { animation:goalFlash 0.8s ease-out; }
#action-log::-webkit-scrollbar { width:4px; }
#action-log::-webkit-scrollbar-thumb { background:#404040; border-radius:2px; }
</style>
</head>

<body class="flex flex-col items-center min-h-screen p-4 gap-4">

<h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-white to-red-400 uppercase mt-1 px-3 pb-1" style="white-space:nowrap">
  RoboCup: Ultimate
</h1>

  <div class="flex flex-col items-center px-6">

    <span id="score-blue" class="text-5xl font-black font-mono leading-none">0</span>
  </div>
  <div class="h-12 w-px bg-neutral-800"></div>
  <div class="flex flex-col items-center px-4 gap-2">
    <button id="start-btn" onclick="initSimulation()"
      class="px-8 py-3 bg-white text-black font-black uppercase tracking-widest rounded-xl hover:bg-neutral-200 transition-all active:scale-95 shadow-lg">
      Kick Off
    </button>
    <span id="status-text" class="text-[10px] uppercase tracking-widest text-neutral-500 font-bold">Ready</span>
    <span class="text-[9px] uppercase tracking-widest text-neutral-600 font-bold">First to 3 goals</span>
    <span id="pred-badge" class="hidden text-[9px] uppercase tracking-widest font-bold text-neutral-400 border border-neutral-700 rounded-lg px-3 py-1 mt-1"></span>
  </div>
  <div class="h-12 w-px bg-neutral-800"></div>
  <div class="flex flex-col items-center px-6">
    <span class="text-[10px] uppercase tracking-[0.2em] text-red-400 font-bold mb-1">Titans</span>
    <span id="score-red" class="text-5xl font-black font-mono leading-none">0</span>
  </div>
</div>

<div class="relative group">
  <div class="absolute -inset-2 bg-gradient-to-r from-blue-600/20 via-emerald-500/20 to-red-600/20 rounded-3xl blur-2xl opacity-50 group-hover:opacity-100 transition duration-1000"></div>
  <div id="field-wrap" class="relative bg-neutral-950 p-2 rounded-2xl border-4 border-neutral-800 overflow-hidden">
    <canvas id="field" width="900" height="450" class="rounded-lg block"></canvas>
    <div id="winner-overlay" class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
      <div class="text-[10px] uppercase tracking-[0.3em] text-neutral-500 font-bold mb-2">Full Time</div>
      <h2 id="winner-text" class="text-6xl font-black italic uppercase tracking-tighter text-yellow-400 mb-3">—</h2>
      <div id="final-score-display" class="flex items-center gap-4 mb-5">
        <div class="flex flex-col items-center">
          <span class="text-[10px] uppercase tracking-widest text-blue-400 font-bold mb-1">Strikers</span>
          <span id="final-score-blue" class="text-5xl font-black font-mono text-blue-400">0</span>
        </div>
        <span class="text-3xl font-black text-neutral-600">–</span>
        <div class="flex flex-col items-center">
          <span class="text-[10px] uppercase tracking-widest text-red-400 font-bold mb-1">Titans</span>
          <span id="final-score-red" class="text-5xl font-black font-mono text-red-400">0</span>
        </div>
      </div>
      <div class="h-px w-40 bg-neutral-700 mb-5"></div>
      <div id="pred-picked" class="text-[11px] uppercase tracking-[0.25em] text-neutral-400 font-bold mb-1">—</div>
      <div id="pred-result" class="text-2xl font-black uppercase tracking-[0.3em] text-white mb-8 animate-pulse-slow">—</div>
      <button onclick="initSimulation()" class="px-10 py-4 bg-yellow-400 text-black font-black uppercase tracking-widest rounded-xl hover:bg-yellow-300 transition-all active:scale-95">Rematch</button>
    </div>
    <div id="prediction-overlay" class="hidden absolute inset-0 bg-black/90 backdrop-blur-md flex flex-col items-center justify-center z-40">
      <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white mb-3">Predict the Winner</h2>
      <p class="text-neutral-400 text-sm mb-10 tracking-widest uppercase">Your prediction will be checked at full time</p>
      <div class="flex gap-8">
        <button onclick="startMatch('team1')" class="group flex flex-col items-center gap-4 p-8 rounded-3xl border-2 border-blue-500/20 hover:border-blue-500 hover:bg-blue-500/10 transition-all active:scale-95 w-48">
          <div class="w-20 h-20 rounded-full bg-blue-500 shadow-[0_0_30px_rgba(59,130,246,0.6)] group-hover:scale-110 transition-transform" style="min-width:5rem;min-height:5rem"></div>
          <span class="text-xl font-black uppercase tracking-widest text-blue-400">Strikers</span>
        </button>
        <button onclick="startMatch('team2')" class="group flex flex-col items-center gap-4 p-8 rounded-3xl border-2 border-red-500/20 hover:border-red-500 hover:bg-red-500/10 transition-all active:scale-95 w-48">
          <div class="w-20 h-20 rounded-full bg-red-500 shadow-[0_0_30px_rgba(239,68,68,0.6)] group-hover:scale-110 transition-transform" style="min-width:5rem;min-height:5rem"></div>
          <span class="text-xl font-black uppercase tracking-widest text-red-400">Titans</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="w-full max-w-5xl flex items-start gap-4">
  <div class="flex-1 bg-neutral-900 rounded-xl border border-neutral-800 p-4">
    <div class="text-[10px] uppercase tracking-widest text-neutral-500 font-bold mb-3">Match Stats</div>
    <div class="grid grid-cols-4 gap-3">
      <div class="flex flex-col items-center gap-1 bg-neutral-800/60 rounded-lg p-3">
        <span class="text-lg">🎯</span>
        <span class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Shots</span>
        <span id="stat-shots" class="text-2xl font-black font-mono">0</span>
      </div>
      <div class="flex flex-col items-center gap-1 bg-neutral-800/60 rounded-lg p-3">
        <span class="text-lg">↗️</span>
        <span class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Passes</span>
        <span id="stat-passes" class="text-2xl font-black font-mono">0</span>
      </div>
      <div class="flex flex-col items-center gap-1 bg-neutral-800/60 rounded-lg p-3">
        <span class="text-lg">💪</span>
        <span class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Tackles</span>
        <span id="stat-tackles" class="text-2xl font-black font-mono">0</span>
      </div>
      <div class="flex flex-col items-center gap-1 bg-neutral-800/60 rounded-lg p-3">
        <span class="text-lg">🧤</span>
        <span class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Saves</span>
        <span id="stat-saves" class="text-2xl font-black font-mono">0</span>
      </div>
    </div>
  </div>
  <div class="w-72 bg-neutral-900 rounded-xl border border-neutral-800 p-4">
    <div class="text-[10px] uppercase tracking-widest text-neutral-500 font-bold mb-2">Action Log</div>
    <div id="action-log" class="overflow-y-auto max-h-28 flex flex-col gap-0.5 text-xs font-mono">
      <span class="text-neutral-600">No events yet…</span>
    </div>
  </div>
</div>

<!-- =================================================================
     PROLOG — Full football simulation
     Sections:
       1. Knowledge Representation (static facts)
       2. Dynamic state declarations
       3. Reset / initialisation
       4. Helper predicates
       5. STRIPS-style action predicates
       6. FSM / AI behaviors per role
       7. Ball physics
       8. Loose-ball pickup (possession-aware)
       9. Goal detection & scoring
      10. Main step predicate
      11. State query
     ================================================================= -->
<script id="prolog-logic" type="text/prolog">
    :- use_module(library(lists)).
    :- use_module(library(random)).

    % ------------------------------------------------------------------
    % 1. KNOWLEDGE REPRESENTATION
    % ------------------------------------------------------------------
    goal_target(team1, 100, 25).
    goal_target(team2, 0,   25).

    in_shoot_range(team1, X) :- X >= 68.
    in_shoot_range(team2, X) :- X =< 32.

    % Cooldown ticks after a kick before anyone can pick up the ball.
    pass_cooldown(12).
    shot_cooldown(20).

    % ------------------------------------------------------------------
    % 2. DYNAMIC STATE
    % ------------------------------------------------------------------
    :- dynamic(ball/2).         % ball(pos(X,Y), vel(VX,VY))
    :- dynamic(player/5).       % player(Team, Role, pos(X,Y), Stamina, State)
    :- dynamic(score/2).
    :- dynamic(game_over/1).
    :- dynamic(tick/1).
    :- dynamic(paused_until/1).
    :- dynamic(pending_reset/2).
    :- dynamic(possession/1).   % possession(Team) — who last had the ball
    :- dynamic(carrier/2).      % carrier(Team, Role) — who physically holds ball
    :- dynamic(cooldown/1).     % cooldown(N) — ticks until loose-ball pickup allowed
    :- dynamic(stat/2).         % stat(shots|passes|tackles|saves, N)

    % ------------------------------------------------------------------
    % 3. RESET / INITIALISATION
    % ------------------------------------------------------------------
    reset_game :-
        retractall(ball(_,_)), retractall(player(_,_,_,_,_)),
        retractall(score(_,_)), retractall(game_over(_)),
        retractall(tick(_)),   retractall(paused_until(_)),
        retractall(pending_reset(_,_)),
        retractall(possession(_)), retractall(carrier(_,_)),
        retractall(cooldown(_)),   retractall(stat(_,_)),
        assertz(tick(0)), assertz(paused_until(0)), assertz(cooldown(0)),
        assertz(ball(pos(50,25), vel(0,0))),
        assertz(score(team1, 0)), assertz(score(team2, 0)),
        assertz(stat(shots, 0)), assertz(stat(passes, 0)),
        assertz(stat(tackles, 0)), assertz(stat(saves, 0)),
        reset_positions(team1).

    reset_positions(KickTeam) :-
        retractall(player(_,_,_,_,_)),
        retractall(carrier(_,_)), retractall(possession(_)),
        retractall(cooldown(_)), assertz(cooldown(0)),
        assertz(possession(KickTeam)),
        assertz(carrier(KickTeam, forward)),
        (KickTeam == team1 ->
            assertz(player(team1, forward, pos(50,25), 100, idle))
        ;   assertz(player(team1, forward, pos(38,22), 100, idle))
        ),
        assertz(player(team1, midfielder, pos(32,28), 100, idle)),
        assertz(player(team1, defender,   pos(18,22), 100, idle)),
        assertz(player(team1, goalkeeper, pos(5, 25),  100, idle)),
        (KickTeam == team2 ->
            assertz(player(team2, forward, pos(50,25), 100, idle))
        ;   assertz(player(team2, forward, pos(62,28), 100, idle))
        ),
        assertz(player(team2, midfielder, pos(68,22), 100, idle)),
        assertz(player(team2, defender,   pos(82,28), 100, idle)),
        assertz(player(team2, goalkeeper, pos(95,25),  100, idle)).

    % ------------------------------------------------------------------
    % 4. HELPERS
    % ------------------------------------------------------------------
    limit(V, L, H, O) :- O is max(L, min(H, V)).

    normalize(DX, DY, NX, NY) :-
        D is sqrt(DX*DX + DY*DY),
        (D > 0.001 -> NX is DX/D, NY is DY/D ; NX = 0, NY = 0).

    pdist(X1, Y1, X2, Y2, D) :-
        D is sqrt((X2-X1)*(X2-X1) + (Y2-Y1)*(Y2-Y1)).

    % Nearest non-GK teammate to ball
    nearest_to_ball(Team, Role) :-
        ball(pos(BX,BY), _),
        findall(D-R,
            (player(Team, R, pos(PX,PY), _, _), R \= goalkeeper,
             D is sqrt((BX-PX)*(BX-PX)+(BY-PY)*(BY-PY))),
            Ds),
        Ds \= [],
        keysort(Ds, [_-Role|_]).

    % Vertical-only separation — pushes player away from nearest neighbour in Y
    sep(PX, PY, SDX, SDY) :-
        findall(D-oy(OY),
            (player(_,_,pos(OX,OY),_,_),
             (OX \= PX ; OY \= PY),
             D is sqrt((OX-PX)*(OX-PX)+(OY-PY)*(OY-PY)), D < 8),
            Ds),
        (Ds \= [] ->
            keysort(Ds, [MD-oy(MY)|_]),
            (MD < 5 -> (PY > MY -> SDY = 0.5 ; SDY = -0.5), SDX = 0
                     ; SDX = 0, SDY = 0)
        ;   SDX = 0, SDY = 0).

    % Stamina: simple drain/recover, no exhausted state
    upd_stam(S, Spd, NS, _St, idle) :-
        (Spd > 0.5 -> NS is max(0, S - 0.15) ; NS is min(100, S + 0.2)).

    bump(Name) :-
        stat(Name, V), NV is V+1,
        retract(stat(Name, V)), assertz(stat(Name, NV)).

    % Move player one step toward (TX,TY) with vertical separation
    step_toward(Team, Role, PX, PY, TX, TY, S, St, Spd) :-
        Dist is sqrt((TX-PX)*(TX-PX) + (TY-PY)*(TY-PY)),
        (Dist < 1.2 ->
            upd_stam(S, 0, NS, St, NSt),
            retract(player(Team,Role,_,_,_)),
            assertz(player(Team,Role,pos(PX,PY),NS,NSt))
        ;
            normalize(TX-PX, TY-PY, NX, NY),
            sep(PX, PY, SDX, SDY),
            NX2 is PX + (NX + SDX*0.2)*Spd,
            NY2 is PY + (NY*0.9 + SDY*0.2)*Spd,
            limit(NX2, 1, 99, CX), limit(NY2, 1, 49, CY),
            upd_stam(S, Spd, NS, St, NSt),
            retract(player(Team,Role,_,_,_)),
            assertz(player(Team,Role,pos(CX,CY),NS,NSt))
        ).

    % ------------------------------------------------------------------
    % 5. STRIPS-STYLE ACTIONS
    % ------------------------------------------------------------------

    % SHOOT — high-velocity kick toward goal; sets shot cooldown
    do_shoot(T, Role, PX, PY, S) :-
        carrier(T, Role), !,
        goal_target(T, GX, _),
        random_between(17, 33, TY),
        normalize(GX-PX, TY-PY, NX, NY),
        VX is NX*4.5, VY is NY*4.5,
        shot_cooldown(CD),
        retractall(carrier(_,_)),
        retractall(cooldown(_)), assertz(cooldown(CD)),
        retract(ball(_,_)), assertz(ball(pos(PX,PY), vel(VX,VY))),
        NS is max(0, S-4),
        retract(player(T,Role,_,_,_)), assertz(player(T,Role,pos(PX,PY),NS,shooting)),
        bump(shots).

    % PASS — kick ball to teammate; sets pass cooldown
    do_pass(T, From, To, PX, PY, S) :-
        carrier(T, From), !,
        player(T, To, pos(TX,TY), _, _), From \= To,
        normalize(TX-PX, TY-PY, NX, NY),
        Dist is sqrt((TX-PX)*(TX-PX)+(TY-PY)*(TY-PY)),
        PassSpd is min(3.5, max(1.8, Dist*0.10)),
        VX is NX*PassSpd, VY is NY*PassSpd,
        pass_cooldown(CD),
        retractall(carrier(_,_)),
        retractall(cooldown(_)), assertz(cooldown(CD)),
        retract(ball(_,_)), assertz(ball(pos(PX,PY), vel(VX,VY))),
        NS is max(0, S-2),
        retract(player(T,From,_,_,_)), assertz(player(T,From,pos(PX,PY),NS,passing)),
        bump(passes).

    % DRIBBLE — carrier moves with ball (ball teleports to player each tick)
    do_dribble(T, Role, PX, PY, S, St, Spd, Tick) :-
        carrier(T, Role), !,
        goal_target(T, GX, GY),
        normalize(GX-PX, GY-PY, NX, NY),
        sep(PX, PY, SDX, SDY),
        Wander is sin(Tick*0.045 + PY*0.13) * 0.09,
        NX2 is PX + (NX + SDX*0.18)*Spd*0.68,
        NY2 is PY + (NY + SDY*0.18 + Wander)*Spd*0.68,
        limit(NX2, 1, 99, CX), limit(NY2, 1, 49, CY),
        upd_stam(S, Spd, NS, St, _),
        retract(ball(_,_)), assertz(ball(pos(CX,CY), vel(0,0))),
        retract(player(T,Role,_,_,_)), assertz(player(T,Role,pos(CX,CY),NS,dribbling)).

    % DRIBBLE toward a custom target (used by midfielder to advance to centre, not goal)
    do_dribble_to(T, Role, PX, PY, TX, TY, S, St, Spd, Tick) :-
        carrier(T, Role), !,
        normalize(TX-PX, TY-PY, NX, NY),
        sep(PX, PY, SDX, SDY),
        Wander is sin(Tick*0.045 + PY*0.13) * 0.09,
        NX2 is PX + (NX + SDX*0.18)*Spd*0.68,
        NY2 is PY + (NY + SDY*0.18 + Wander)*Spd*0.68,
        limit(NX2, 1, 99, CX), limit(NY2, 1, 49, CY),
        upd_stam(S, Spd, NS, St, _),
        retract(ball(_,_)), assertz(ball(pos(CX,CY), vel(0,0))),
        retract(player(T,Role,_,_,_)), assertz(player(T,Role,pos(CX,CY),NS,dribbling)).

    % TACKLE — attempt to win ball from opponent carrier (55% success if close)
    do_tackle(T, Role, PX, PY, S, St, Spd, OX, OY) :-
        pdist(PX, PY, OX, OY, D),
        (D < 3.2 ->
            random(R),
            (R < 0.55 ->
                retractall(carrier(_,_)), assertz(carrier(T, Role)),
                retractall(possession(_)), assertz(possession(T)),
                retractall(cooldown(_)), assertz(cooldown(0)),
                retract(ball(_,_)), assertz(ball(pos(PX,PY), vel(0,0))),
                retract(player(T,Role,_,_,_)), assertz(player(T,Role,pos(PX,PY),S,tackling)),
                bump(tackles)
            ;
                step_toward(T, Role, PX, PY, OX, OY, S, St, Spd*0.8)
            )
        ;
            step_toward(T, Role, PX, PY, OX, OY, S, St, Spd)
        ).

    % ------------------------------------------------------------------
    % 6. AI BEHAVIORS
    % Decision tree per role:
    %   I hold ball → shoot/dribble/pass
    %   Teammate holds ball → make run
    %   Opponent holds ball → press/tackle
    %   Loose ball → chase if nearest, else hold zone
    % ------------------------------------------------------------------

    % ---- FORWARD ----
    ai_behavior(T, forward) :-
        player(T, forward, pos(PX,PY), S, St),
        tick(Tick), Spd = 0.88,
        (T == team1 -> Opp = team2, FwdZoneX = 72, HomeX = 62
        ;              Opp = team1, FwdZoneX = 28, HomeX = 38),

        (carrier(T, forward) ->
            % Shoot if in range, else dribble toward goal
            (in_shoot_range(T, PX) ->
                do_shoot(T, forward, PX, PY, S)
            ;
                do_dribble(T, forward, PX, PY, S, St, Spd, Tick)
            )

        ; carrier(T, _) ->
            % Teammate has ball — make an attacking run into the box
            (PY < 25 -> ZoneY = 20 ; ZoneY = 30),
            step_toward(T, forward, PX, PY, FwdZoneX, ZoneY, S, St, Spd*0.65)

        ; carrier(Opp, OppRole),
          player(Opp, OppRole, pos(CX,CY), _, _) ->
            % Opponent has ball — press
            step_toward(T, forward, PX, PY, CX, CY, S, St, Spd*0.9)

        ;
            % Loose ball
            ball(pos(BX,BY), _),
            (nearest_to_ball(T, forward) ->
                step_toward(T, forward, PX, PY, BX, BY, S, St, Spd)
            ;
                step_toward(T, forward, PX, PY, HomeX, 25, S, St, Spd*0.45)
            )
        ).

    % ---- MIDFIELDER ----
    ai_behavior(T, midfielder) :-
        player(T, midfielder, pos(PX,PY), S, St),
        tick(Tick), Spd = 0.78,
        (T == team1 -> Opp = team2, HomeX = 40, DefX = 28, ChaseLimit = 52
        ;              Opp = team1, HomeX = 60, DefX = 72, ChaseLimit = 48),

        (carrier(T, midfielder) ->
            % Pass to forward if they're upfield, else advance with ball
            (player(T, forward, pos(FX,_), _, _),
             (T == team1 -> FX >= 56 ; FX =< 44) ->
                do_pass(T, midfielder, forward, PX, PY, S)
            ; (T == team1, PX < 48 ; T == team2, PX > 52) ->
                % Own half — advance ball to centre, don't charge the goal
                (T == team1 -> AdvX = 52 ; AdvX = 48),
                do_dribble_to(T, midfielder, PX, PY, AdvX, 25, S, St, Spd, Tick)
            ;
                % Already in attacking half — dribble toward goal
                do_dribble(T, midfielder, PX, PY, S, St, Spd, Tick)
            )

        ; carrier(T, _) ->
            % Teammate dribbling — hold midfield support position
            step_toward(T, midfielder, PX, PY, HomeX, 25, S, St, Spd*0.55)

        ; carrier(Opp, OppRole),
          player(Opp, OppRole, pos(CX,CY), _, _) ->
            % Opponent has ball — tackle if in own half, else drop back
            ball(pos(BX,_), _),
            ((T == team1, BX =< ChaseLimit ; T == team2, BX >= ChaseLimit) ->
                do_tackle(T, midfielder, PX, PY, S, St, Spd*0.85, CX, CY)
            ;
                step_toward(T, midfielder, PX, PY, DefX, 25, S, St, Spd*0.6)
            )

        ;
            % Loose ball — chase if nearest and in own half, else hold
            ball(pos(BX,BY), _),
            (nearest_to_ball(T, midfielder),
             (T == team1 -> BX =< ChaseLimit ; BX >= ChaseLimit) ->
                step_toward(T, midfielder, PX, PY, BX, BY, S, St, Spd)
            ;
                step_toward(T, midfielder, PX, PY, HomeX, 25, S, St, Spd*0.45)
            )
        ).

    % ---- DEFENDER ----
    ai_behavior(T, defender) :-
        player(T, defender, pos(PX,PY), S, St),
        Spd = 0.74,
        (T == team1 -> Opp = team2, OwnGoalX = 0, HomeX = 22, DefLimit = 54
        ;              Opp = team1, OwnGoalX = 100, HomeX = 78, DefLimit = 46),

        (carrier(T, defender) ->
            % Clear up to midfielder
            do_pass(T, defender, midfielder, PX, PY, S)

        ; carrier(T, _) ->
            % Own team dribbling — hold defensive line
            step_toward(T, defender, PX, PY, HomeX, 25, S, St, Spd*0.4)

        ; carrier(Opp, OppRole),
          player(Opp, OppRole, pos(CX,CY), _, _) ->
            % Opponent in dangerous zone — tackle; else mark their forward
            ((T == team1, CX =< DefLimit ; T == team2, CX >= DefLimit) ->
                do_tackle(T, defender, PX, PY, S, St, Spd, CX, CY)
            ;
                (player(Opp, forward, pos(OFX,OFY), _, _) ->
                    MarkX is OFX * 0.3 + OwnGoalX * 0.7,
                    MarkY is OFY * 0.5 + 25 * 0.5,
                    step_toward(T, defender, PX, PY, MarkX, MarkY, S, St, Spd*0.5)
                ;
                    step_toward(T, defender, PX, PY, HomeX, 25, S, St, Spd*0.45)
                )
            )

        ;
            % Loose ball — chase only in own half
            ball(pos(BX,BY), _),
            ((T == team1, BX =< 52 ; T == team2, BX >= 48),
             nearest_to_ball(T, defender) ->
                step_toward(T, defender, PX, PY, BX, BY, S, St, Spd)
            ;
                (player(Opp, forward, pos(OFX,OFY), _, _) ->
                    MarkX is OFX * 0.3 + OwnGoalX * 0.7,
                    MarkY is OFY * 0.5 + 25 * 0.5,
                    step_toward(T, defender, PX, PY, MarkX, MarkY, S, St, Spd*0.5)
                ;
                    step_toward(T, defender, PX, PY, HomeX, 25, S, St, Spd*0.4)
                )
            )
        ).

    % ---- GOALKEEPER ----
    ai_behavior(T, goalkeeper) :-
        player(T, goalkeeper, pos(PX,PY), S, _),
        ball(pos(BX,BY), vel(BVX,BVY)),
        (T == team1 -> GKX = 5, GKMinX = 2, GKMaxX = 14
        ;              GKX = 95, GKMinX = 86, GKMaxX = 98),

        (carrier(T, goalkeeper) ->
            do_pass(T, goalkeeper, defender, PX, PY, S)
        ;
            BallSpd is sqrt(BVX*BVX + BVY*BVY),
            ((BallSpd > 1.5, T == team1, BVX < -0.5) ->
                TicksA is min(10, (BX - GKX) / (-BVX + 0.001)),
                PredY is BY + BVY * TicksA, limit(PredY, 14, 36, TargY)
            ; (BallSpd > 1.5, T == team2, BVX > 0.5) ->
                TicksA is min(10, (GKX - BX) / (BVX + 0.001)),
                PredY is BY + BVY * TicksA, limit(PredY, 14, 36, TargY)
            ;
                limit(BY, 15, 35, TargY)
            ),
            normalize(GKX-PX, TargY-PY, NX, NY),
            NX2 is PX + NX*0.4, NY2 is PY + NY*0.4,
            limit(NX2, GKMinX, GKMaxX, CX), limit(NY2, 13, 37, CY),
            retract(player(T,goalkeeper,_,_,_)),
            assertz(player(T,goalkeeper,pos(CX,CY),100,idle))
        ).

    % ------------------------------------------------------------------
    % 7. BALL PHYSICS
    % ------------------------------------------------------------------
    update_ball :-
        ball(pos(_,_), vel(0,0)), !.   % Ball at rest (dribbling) — no update
    update_ball :-
        ball(pos(X,Y), vel(VX,VY)),
        NX is X + VX, NY is Y + VY,
        % Out-of-bounds: stop ball and clear carrier
        (NY < 0 ->
            limit(NX,1,99,CX),
            retract(ball(_,_)), assertz(ball(pos(CX,1), vel(0,0))),
            retractall(carrier(_,_)), retractall(cooldown(_)), assertz(cooldown(0))
        ; NY > 50 ->
            limit(NX,1,99,CX),
            retract(ball(_,_)), assertz(ball(pos(CX,49), vel(0,0))),
            retractall(carrier(_,_)), retractall(cooldown(_)), assertz(cooldown(0))
        ; NX < 0, (NY =< 16 ; NY >= 34) ->
            limit(NY,1,49,CY),
            retract(ball(_,_)), assertz(ball(pos(1,CY), vel(0,0))),
            retractall(carrier(_,_)), retractall(cooldown(_)), assertz(cooldown(0))
        ; NX > 100, (NY =< 16 ; NY >= 34) ->
            limit(NY,1,49,CY),
            retract(ball(_,_)), assertz(ball(pos(99,CY), vel(0,0))),
            retractall(carrier(_,_)), retractall(cooldown(_)), assertz(cooldown(0))
        ;
            Speed is sqrt(VX*VX + VY*VY),
            (Speed > 2.0 -> Fric = 0.935 ; Fric = 0.962),
            NVX is VX*Fric, NVY is VY*Fric,
            (abs(NVX) < 0.05, abs(NVY) < 0.05 -> FVX=0, FVY=0 ; FVX=NVX, FVY=NVY),
            limit(NX,0,100,CX), limit(NY,1,49,CY),
            retract(ball(_,_)), assertz(ball(pos(CX,CY), vel(FVX,FVY)))
        ).

    % ------------------------------------------------------------------
    % 8. COOLDOWN TICK + LOOSE-BALL PICKUP
    % ------------------------------------------------------------------
    tick_cooldown :-
        cooldown(N), N > 0, !,
        N1 is N-1, retractall(cooldown(_)), assertz(cooldown(N1)).
    tick_cooldown.

    % After cooldown expires, nearest player within 2.8 units picks up the ball.
    try_pickup :-
        carrier(_, _), !.           % Someone already holds it
    try_pickup :-
        cooldown(N), N > 0, !.      % Still in cooldown
    try_pickup :-
        ball(pos(BX,BY), _),
        findall(D-p(T,R,PX,PY),
            (player(T, R, pos(PX,PY), _, _),
             D is sqrt((BX-PX)*(BX-PX)+(BY-PY)*(BY-PY)),
             D < 2.8),
            All),
        All \= [], !,
        keysort(All, [_-p(PT,PR,PPX,PPY)|_]),
        retractall(carrier(_,_)), assertz(carrier(PT, PR)),
        retractall(possession(_)), assertz(possession(PT)),
        retractall(cooldown(_)),   assertz(cooldown(0)),
        retract(ball(_,_)), assertz(ball(pos(PPX,PPY), vel(0,0))).
    try_pickup.

    % ------------------------------------------------------------------
    % 9. GOAL DETECTION + SAVE MECHANIC
    % ------------------------------------------------------------------
    process_goals :-
        ball(pos(X,Y), _),
        (X > 99, Y > 16, Y < 34 -> attempt_save(team2, team1)
        ; X <  1, Y > 16, Y < 34 -> attempt_save(team1, team2)
        ; true).

    attempt_save(DefTeam, ScoringTeam) :-
        ball(pos(BX,BY), vel(VX,VY)),
        player(DefTeam, goalkeeper, pos(GKX,GKY), _, _),
        GKDist is sqrt((BX-GKX)*(BX-GKX)+(BY-GKY)*(BY-GKY)),
        BallSpd is sqrt(VX*VX+VY*VY),
        DistFactor is max(0.0, 1.0 - GKDist/16.0),
        SpdPenalty is min(0.55, BallSpd*0.07),
        SaveProb is max(0.04, DistFactor*0.82 - SpdPenalty),
        random(R),
        (R < SaveProb ->
            random(Rj), Jitter is (Rj-0.5)*1.0,
            NVX is -VX*0.42, NVY is Jitter*0.5,
            retract(ball(_,_)), assertz(ball(pos(BX,BY), vel(NVX,NVY))),
            retractall(carrier(_,_)), assertz(carrier(DefTeam, goalkeeper)),
            retractall(possession(_)), assertz(possession(DefTeam)),
            retractall(cooldown(_)), assertz(cooldown(0)),
            bump(saves)
        ;
            score_goal(ScoringTeam)
        ).

    score_goal(T) :-
        score(T, S), NS is S+1,
        retract(score(T,S)), assertz(score(T,NS)),
        retractall(carrier(_,_)), retractall(cooldown(_)), assertz(cooldown(0)),
        (NS >= 3 ->
            assertz(game_over(T))
        ;
            (T == team1 -> NextKO = team2 ; NextKO = team1),
            tick(Cur),
            PauseEnd is Cur + 120, ResetAt is Cur + 90,
            retractall(paused_until(_)),    assertz(paused_until(PauseEnd)),
            retractall(pending_reset(_,_)), assertz(pending_reset(NextKO, ResetAt)),
            retract(ball(_,_)), assertz(ball(pos(50,25), vel(0,0)))
        ).

    % ------------------------------------------------------------------
    % 10. MAIN STEP
    % ------------------------------------------------------------------
    step :-
        \+ game_over(_),
        tick(T), NT is T+1,
        retract(tick(T)), assertz(tick(NT)),
        (pending_reset(NextKO, ResetAt), NT >= ResetAt ->
            retractall(pending_reset(_,_)),
            reset_positions(NextKO)
        ; true),
        (paused_until(P), NT < P ->
            true
        ;
            run_ai,
            update_ball,
            tick_cooldown,
            try_pickup,
            process_goals
        ).

    run_ai :-
        random(R),
        (R > 0.5 ->
            (ai_behavior(team1,forward), ai_behavior(team1,midfielder),
             ai_behavior(team1,defender), ai_behavior(team1,goalkeeper),
             ai_behavior(team2,forward), ai_behavior(team2,midfielder),
             ai_behavior(team2,defender), ai_behavior(team2,goalkeeper))
        ;
            (ai_behavior(team2,forward), ai_behavior(team2,midfielder),
             ai_behavior(team2,defender), ai_behavior(team2,goalkeeper),
             ai_behavior(team1,forward), ai_behavior(team1,midfielder),
             ai_behavior(team1,defender), ai_behavior(team1,goalkeeper))
        ).

    % ------------------------------------------------------------------
    % 11. STATE QUERY
    % ------------------------------------------------------------------
    get_all_state(BX, BY, Players, Score1, Score2, OT, OR, EvLabel) :-
        ball(pos(BX,BY), _),
        findall(p(T,R,X,Y,S,St), player(T,R,pos(X,Y),S,St), Players),
        score(team1, Score1), score(team2, Score2),
        (carrier(OT, OR) -> true ; OT = none, OR = none),
        EvLabel = none.

    get_stats(Shots, Passes, Tackles, Saves) :-
        stat(shots, Shots), stat(passes, Passes),
        stat(tackles, Tackles), stat(saves, Saves).
</script>

<!-- ================================================================
     JAVASCRIPT ENGINE — callback-chained RAF (no promise stacking)
     ================================================================ -->
<script>
    const canvas = document.getElementById('field');
    const ctx    = canvas.getContext('2d');
    const SCALE  = 9;

    let session        = null;
    let running        = false;
    let requestRef     = null;
    let lastTime       = 0;
    let userPrediction = null;
    const stepRate     = 1000 / 60;

    let prevS1 = 0, prevS2 = 0;
    let prevOT = 'none', prevOR = 'none';
    let fieldLabel = '', fieldLabelAlpha = 0, prevFieldLabel = '';
    let goalOverlayTimer = 0;
    let gameOverState = null;   // set when match ends, drives canvas result panel
    let prevSaves = 0;
    let ballTrail = [];         // stores last N ball positions for trail effect
    let prevBallSpd = 0;        // for detecting shots in the log
    const shootingPlayers = new Set();  // track who was already logged as shooting

    // ----------------------------------------------------------------
    // Init / Kick Off
    // ----------------------------------------------------------------
    function initSimulation() {
        if (requestRef) cancelAnimationFrame(requestRef);
        running = false;
        gameOverState = null;
        document.getElementById('winner-overlay').classList.add('hidden');
        document.getElementById('prediction-overlay').classList.remove('hidden');
        document.getElementById('status-text').innerText = 'Pick a team';
        document.getElementById('pred-badge').classList.add('hidden');
    }

    function startMatch(pred) {
        userPrediction = pred;
        document.getElementById('prediction-overlay').classList.add('hidden');
        document.getElementById('status-text').innerText = 'Loading…';
        const badge = document.getElementById('pred-badge');
        badge.innerText = 'Predicted: ' + (pred === 'team1' ? 'Strikers' : 'Titans');
        badge.classList.remove('hidden');
        ['score-blue','score-red'].forEach(id => document.getElementById(id).innerText = '0');
        ['stat-shots','stat-passes','stat-tackles','stat-saves'].forEach(id => document.getElementById(id).innerText = '0');
        document.getElementById('action-log').innerHTML = '';
        prevS1 = 0; prevS2 = 0; prevOT = 'none'; prevOR = 'none';
        fieldLabel = ''; fieldLabelAlpha = 0; prevFieldLabel = ''; goalOverlayTimer = 0;
        prevSaves = 0; ballTrail = []; prevBallSpd = 0; shootingPlayers.clear();

        session = pl.create(3000);
        session.consult(document.getElementById('prolog-logic').textContent, {
            success: () => {
                session.query('reset_game.', {
                    success: () => {
                        session.answer({
                            success: () => {
                                running = true;
                                document.getElementById('status-text').innerText = 'Match Live';
                                document.getElementById('start-btn').innerText = 'Reset';
                                lastTime = performance.now();
                                loop(lastTime);
                            },
                            error: e => console.error('reset answer:', e)
                        });
                    },
                    error: e => console.error('reset query:', e)
                });
            },
            error: e => console.error('consult:', e)
        });
    }

    // ----------------------------------------------------------------
    // RAF loop — next frame only fired from inside draw callback
    // ----------------------------------------------------------------
    function loop(ts) {
        if (!running || !session) return;
        if (ts - lastTime >= stepRate) {
            lastTime = ts;
            session.query('step.', {
                success: () => {
                    session.answer({
                        success: (ans) => {
                            if (!ans) handleGameOver();
                            updateStateAndDraw();
                        },
                        fail:    () => { handleGameOver(); updateStateAndDraw(); },
                        error:   () => { handleGameOver(); updateStateAndDraw(); }
                    });
                },
                error: () => { handleGameOver(); updateStateAndDraw(); }
            });
        } else {
            requestRef = requestAnimationFrame(loop);
        }
    }

    function scheduleNext() {
        if (running) requestRef = requestAnimationFrame(loop);
    }

    // ----------------------------------------------------------------
    // Query Prolog state then draw
    // ----------------------------------------------------------------
    function updateStateAndDraw() {
        session.query('get_all_state(BX,BY,Players,S1,S2,OT,OR,EL).', {
            success: () => {
                session.answer({
                    fail:    scheduleNext,
                    success: (ans) => {
                        if (!ans) { scheduleNext(); return; }

                        const bx = ans.lookup('BX').value;
                        const by = ans.lookup('BY').value;
                        const s1 = ans.lookup('S1').value;
                        const s2 = ans.lookup('S2').value;
                        const ot = termId(ans.lookup('OT'));
                        const or_= termId(ans.lookup('OR'));
                        const el = termId(ans.lookup('EL'));

                        // Event label (throw-in / corner / goal kick)
                        const labelMap = {
                            throw_in:    '⟵ THROW IN ⟶',
                            corner_kick: '⚑ CORNER KICK',
                            goal_kick:   '🥅 GOAL KICK'
                        };
                        if (el !== 'none' && labelMap[el]) {
                            fieldLabel = labelMap[el];
                            fieldLabelAlpha = 1.0;
                            if (el !== prevFieldLabel) {
                                addLog('📢 ' + labelMap[el], 'event');
                                prevFieldLabel = el;
                            }
                        } else {
                            prevFieldLabel = '';
                            fieldLabelAlpha = Math.max(0, fieldLabelAlpha - 0.04);
                            if (fieldLabelAlpha <= 0) fieldLabel = '';
                        }

                        // Score events
                        if (s1 !== prevS1 || s2 !== prevS2) {
                            addLog(`⚽ GOAL!  ${s1} – ${s2}`, 'goal');
                            flashGoal();
                            goalOverlayTimer = 110;
                            document.getElementById('score-blue').innerText = s1;
                            document.getElementById('score-red').innerText  = s2;
                            prevS1 = s1; prevS2 = s2;
                        }

                        // Possession / carrier events
                        if (ot !== prevOT || or_ !== prevOR) {
                            if (ot !== 'none') {
                                const tn = ot === 'team1' ? 'Strikers' : 'Titans';
                                if (or_ === 'goalkeeper') {
                                    addLog(`🧤 ${tn} GK distributes`, 'save');
                                } else {
                                    const logType = or_ === 'defender' ? 'defend' : 'carry';
                                    const roleLabel = {forward:'FWD', midfielder:'MID', defender:'DEF'}[or_] || or_;
                                    addLog(`🏃 ${tn} ${roleLabel}`, logType);
                                }
                            }
                            prevOT = ot; prevOR = or_;
                        }

                        // Parse player list
                        const players = [];
                        const currentShooters = new Set();
                        let list = ans.lookup('Players');
                        while (list && list.indicator === './2') {
                            const p = list.args[0];
                            const pState = termId(p.args[5]);
                            const pTeam  = p.args[0].id;
                            const pRole  = p.args[1].id;
                            if (pState === 'shooting') {
                                const key = pTeam + ':' + pRole;
                                currentShooters.add(key);
                                if (!shootingPlayers.has(key)) {
                                    const tn = pTeam === 'team1' ? 'Strikers' : 'Titans';
                                    const rl = {forward:'FWD',midfielder:'MID'}[pRole] || pRole;
                                    addLog(`🎯 ${tn} ${rl} SHOOTS!`, 'shot');
                                }
                            }
                            players.push({
                                team:    pTeam,
                                role:    pRole,
                                x:       p.args[2].value,
                                y:       p.args[3].value,
                                stamina: p.args[4].value,
                                state:   pState
                            });
                            list = list.args[1];
                        }
                        // Update shooting tracker — clear players no longer shooting
                        shootingPlayers.clear();
                        currentShooters.forEach(k => shootingPlayers.add(k));

                        draw(bx, by, players, ot, or_, fieldLabel, fieldLabelAlpha, goalOverlayTimer);

                        // Stats
                        session.query('get_stats(Shots,Passes,Tackles,Saves).', {
                            success: () => {
                                session.answer({
                                    fail:    scheduleNext,
                                    success: (m) => {
                                        if (m) {
                                            document.getElementById('stat-shots').innerText   = m.lookup('Shots').value;
                                            document.getElementById('stat-passes').innerText  = m.lookup('Passes').value;
                                            document.getElementById('stat-tackles').innerText = m.lookup('Tackles').value;
                                            const sv = m.lookup('Saves').value;
                                            document.getElementById('stat-saves').innerText  = sv;
                                            if (sv > prevSaves) {
                                                addLog('🧤 SAVE!', 'save');
                                                prevSaves = sv;
                                            }
                                        }
                                        scheduleNext();
                                    },
                                    error: scheduleNext
                                });
                            },
                            error: scheduleNext
                        });
                    },
                    error: scheduleNext
                });
            },
            error: scheduleNext
        });
    }

    function termId(t) {
        if (!t) return 'none';
        if (t.id !== undefined) return t.id;
        if (t.value !== undefined) return String(t.value);
        return 'none';
    }

    // ----------------------------------------------------------------
    // Game over
    // ----------------------------------------------------------------
    // Detect game over from already-known scores — no second Prolog query needed.
    // (Avoids the Tau Prolog single-active-query limitation that causes race conditions.)
    function handleGameOver() {
        if (gameOverState) return;   // already handled
        const w = prevS1 >= 3 ? 'team1' : prevS2 >= 3 ? 'team2' : null;
        if (!w) return;              // scores haven't reached 3 yet
        running = false;
        if (requestRef) cancelAnimationFrame(requestRef);
        document.getElementById('status-text').innerText = 'Full Time';
        document.getElementById('start-btn').innerText = 'Kick Off';

        const ok         = userPrediction === w;
        const winnerName = w === 'team1' ? 'Strikers' : 'Titans';
        const predName   = userPrediction === 'team1' ? 'Strikers'
                         : userPrediction === 'team2' ? 'Titans' : '—';
        gameOverState = { winner: w, winnerName, s1: prevS1, s2: prevS2, predName, ok };
        addLog(w === 'team1' ? '🏆 Strikers Win!' : '🏆 Titans Win!', 'goal');

        // Populate and show the HTML overlay (reliable — sits above canvas in DOM)
        const teamColor = w === 'team1' ? '#60a5fa' : '#f87171';
        const el = document.getElementById('winner-text');
        el.textContent = winnerName.toUpperCase() + ' WIN!';
        el.style.color = teamColor;

        document.getElementById('final-score-blue').textContent = prevS1;
        document.getElementById('final-score-red').textContent  = prevS2;
        document.getElementById('pred-picked').textContent = 'You predicted: ' + predName.toUpperCase();

        const pr = document.getElementById('pred-result');
        pr.textContent  = ok ? '✓  CORRECT PREDICTION!' : '✗  WRONG PREDICTION';
        pr.style.color  = ok ? '#34d399' : '#f87171';

        document.getElementById('winner-overlay').classList.remove('hidden');
    }

    // ----------------------------------------------------------------
    // Game-over result panel — drawn directly on the canvas
    // Uses manual rounded-rect path (broad browser support)
    // ----------------------------------------------------------------
    function canvasRRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y,     x + w, y + r,     r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x,     y + h, x,       y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x,     y,     x + r,   y,         r);
        ctx.closePath();
    }

    function drawGameOverPanel() {
        const gos = gameOverState;
        if (!gos) return;
        const W = canvas.width, H = canvas.height;
        const teamColor  = gos.winner === 'team1' ? '#60a5fa' : '#f87171';
        const resultColor = gos.ok ? '#34d399' : '#f87171';
        const pw = 460, ph = 290;
        const px = (W - pw) / 2, py = (H - ph) / 2;
        const cx = W / 2;

        ctx.save();

        // Dim field behind panel
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);

        // Panel background
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0d1117';
        canvasRRect(px, py, pw, ph, 18);
        ctx.fill();

        // Winner-colored border (thicker)
        ctx.strokeStyle = teamColor;
        ctx.lineWidth = 3;
        canvasRRect(px, py, pw, ph, 18);
        ctx.stroke();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // FULL TIME label
        ctx.fillStyle = '#6b7280';
        ctx.font = 'bold 11px Inter,sans-serif';
        ctx.fillText('F U L L   T I M E', cx, py + 28);

        // Winner name
        ctx.fillStyle = teamColor;
        ctx.font = 'bold italic 44px Inter,sans-serif';
        ctx.fillText(gos.winnerName.toUpperCase() + ' WIN!', cx, py + 78);

        // Score
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 52px JetBrains Mono,monospace';
        ctx.fillText(gos.s1 + '  \u2013  ' + gos.s2, cx, py + 134);

        // Divider
        ctx.fillStyle = '#374151';
        ctx.fillRect(cx - 110, py + 158, 220, 1);

        // Prediction pill background
        ctx.globalAlpha = gos.ok ? 0.15 : 0.12;
        ctx.fillStyle = resultColor;
        canvasRRect(px + 40, py + 167, pw - 80, 70, 12);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Prediction pill border
        ctx.strokeStyle = resultColor;
        ctx.lineWidth = 1.5;
        canvasRRect(px + 40, py + 167, pw - 80, 70, 12);
        ctx.stroke();

        // "YOU PREDICTED" label
        ctx.fillStyle = '#9ca3af';
        ctx.font = 'bold 11px Inter,sans-serif';
        ctx.fillText('YOU PREDICTED:  ' + gos.predName.toUpperCase(), cx, py + 186);

        // Correct / Wrong result — larger and bold
        ctx.fillStyle = resultColor;
        ctx.font = 'bold 20px Inter,sans-serif';
        ctx.fillText(gos.ok ? '\u2713  CORRECT PREDICTION!' : '\u2717  WRONG PREDICTION', cx, py + 213);

        // Rematch button
        const bw = 170, bh = 42, bx2 = cx - bw / 2, by2 = py + ph - 52;
        ctx.fillStyle = '#facc15';
        canvasRRect(bx2, by2, bw, bh, 10);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 14px Inter,sans-serif';
        ctx.fillText('REMATCH', cx, by2 + bh / 2);

        ctx.restore();
    }

    function flashGoal() {
        const fw = document.getElementById('field-wrap');
        fw.classList.add('goal-flash');
        setTimeout(() => fw.classList.remove('goal-flash'), 800);
    }

    function addLog(text, type) {
        const el = document.createElement('div');
        el.textContent = text;
        el.className = 'leading-relaxed';
        if      (type === 'goal')   el.style.color = '#facc15';
        else if (type === 'shot')   el.style.color = '#f97316';
        else if (type === 'carry')  el.style.color = '#60a5fa';
        else if (type === 'defend') el.style.color = '#a78bfa';
        else if (type === 'event')  el.style.color = '#34d399';
        else if (type === 'save')   el.style.color = '#34d399';
        else                        el.style.color = '#d1d5db';
        const log = document.getElementById('action-log');
        log.insertBefore(el, log.firstChild);
        while (log.children.length > 8) log.removeChild(log.lastChild);
    }

    // ----------------------------------------------------------------
    // DRAW
    // ----------------------------------------------------------------
    function draw(bx, by, players, ownerTeam, ownerRole, evLabel, evAlpha, goalTimer) {
        const W = canvas.width, H = canvas.height, S = SCALE;

        // Field background
        ctx.fillStyle = '#1b4332';
        ctx.fillRect(0, 0, W, H);

        // Alternating pitch stripes
        for (let i = 0; i < 10; i++) {
            if (i % 2 === 0) { ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fillRect(i*90,0,90,H); }
        }

        ctx.save();

        // --- Field markings ---
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth   = 2;
        ctx.strokeRect(10, 10, W-20, H-20);                               // outer border

        ctx.beginPath(); ctx.moveTo(W/2,10); ctx.lineTo(W/2,H-10); ctx.stroke(); // halfway

        ctx.beginPath(); ctx.arc(W/2,H/2,60,0,Math.PI*2); ctx.stroke();   // centre circle
        ctx.beginPath(); ctx.arc(W/2,H/2,4,0,Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();               // centre spot

        // Corner arcs
        ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        [[10,10,0,Math.PI/2],[W-10,10,Math.PI/2,Math.PI],
         [10,H-10,-Math.PI/2,0],[W-10,H-10,Math.PI,1.5*Math.PI]].forEach(([cx,cy,a0,a1]) => {
            ctx.beginPath(); ctx.arc(cx,cy,20,a0,a1); ctx.stroke();
        });

        // Goal boxes (field Y 16–34 → pixel Y 144–306, height 162px)
        const gy = H/2-81, gh = 162;
        ctx.fillStyle   = 'rgba(255,255,255,0.05)';
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth   = 1.5;
        ctx.fillRect(10,gy,65,gh);    ctx.strokeRect(10,gy,65,gh);
        ctx.fillRect(W-75,gy,65,gh);  ctx.strokeRect(W-75,gy,65,gh);

        // Goal nets
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(0,gy,10,gh);
        ctx.fillRect(W-10,gy,10,gh);

        // Penalty spots
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        [150,W-150].forEach(px => { ctx.beginPath(); ctx.arc(px,H/2,4,0,Math.PI*2); ctx.fill(); });

        // Team labels
        ctx.font = 'bold 11px Inter,sans-serif';
        ctx.fillStyle = 'rgba(96,165,250,0.65)';
        ctx.textAlign = 'left';  ctx.fillText('STRIKERS →', 18, H-14);
        ctx.fillStyle = 'rgba(252,165,165,0.65)';
        ctx.textAlign = 'right'; ctx.fillText('← TITANS', W-18, H-14);
        ctx.restore();

        // --- Players ---
        (players||[]).forEach(p => {
            if (p.x == null) return;
            drawPlayer(p.x*S, p.y*S, p.team, p.role, p.stamina, p.state,
                       p.team === ownerTeam && p.role === ownerRole);
        });

        // --- Ball trail (motion blur effect) ---
        ballTrail.push({x: bx, y: by});
        if (ballTrail.length > 10) ballTrail.shift();
        const trailSpd = ballTrail.length > 1
            ? Math.hypot(bx - ballTrail[ballTrail.length-2].x, by - ballTrail[ballTrail.length-2].y)
            : 0;
        if (trailSpd > 0.8) {
            ballTrail.forEach((pos, i) => {
                const a = (i / ballTrail.length) * 0.35;
                const r = 3 + (i / ballTrail.length) * 4;
                ctx.save();
                ctx.globalAlpha = a;
                ctx.beginPath();
                ctx.arc(pos.x * S, pos.y * S, r, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.restore();
            });
        } else {
            ballTrail = [];
        }

        // --- Ball ---
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.arc(bx*S, by*S, 7, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();

        // Helper: draw a centered pill label
        function drawPill(text, cy, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 22px Inter,sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const tw = ctx.measureText(text).width;
            const pr = 14;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.beginPath();
            ctx.roundRect(W/2 - tw/2 - pr, cy - 19, tw + pr*2, 38, 10);
            ctx.fill();
            ctx.fillStyle = color;
            ctx.fillText(text, W/2, cy);
            ctx.restore();
        }

        // --- Goal pill ---
        if (goalTimer > 0) {
            const alpha = Math.min(1, goalTimer / 15);
            drawPill('⚽  GOAL!', H/2 - 28, '#facc15', alpha);
            if (goalTimer > 0) goalOverlayTimer--;
        }

        // --- Set-piece pill (throw-in / corner / goal kick) ---
        if (evLabel && evAlpha > 0) {
            drawPill(evLabel, H/2 + 12, '#34d399', evAlpha);
        }

        // --- Legend (bottom-right corner) ---
        ctx.save();
        ctx.font = '9px Inter,sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText('● White ring = ball carrier', W - 12, H - 4);
        ctx.restore();

        // Game-over panel drawn on canvas is replaced by the HTML #winner-overlay
    }

    function drawPlayer(px, py, team, role, stamina, state, isCarrier) {
        const color = team === 'team1' ? '#3b82f6' : '#ef4444';
        const glow  = team === 'team1' ? 'rgba(59,130,246,0.5)' : 'rgba(239,68,68,0.5)';
        const r = 14;

        // Ground shadow
        ctx.save(); ctx.globalAlpha = 0.28;
        ctx.beginPath(); ctx.ellipse(px, py+r*0.5, r*0.8, r*0.26, 0, 0, Math.PI*2);
        ctx.fillStyle = '#000'; ctx.fill(); ctx.restore();

        // White ring — only when this player is the carrier (dribbling / last kicked)
        if (isCarrier) {
            ctx.save(); ctx.globalAlpha = 0.9;
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(px, py, r+5, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }

        // Glow
        ctx.save(); ctx.globalAlpha = 0.5;
        ctx.strokeStyle = glow; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.stroke(); ctx.restore();

        // Body
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();

        // Inner ring
        ctx.save(); ctx.globalAlpha = 0.4;
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); ctx.stroke(); ctx.restore();

        // Role letter
        const L = {goalkeeper:'G',defender:'D',midfielder:'M',forward:'F'}[role]||'?';
        ctx.save();
        ctx.fillStyle='#fff'; ctx.font='bold 10px Inter,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(L, px, py); ctx.restore();

        // Stamina bar (below player)
        const bw=24, bh=4, bx_=px-bw/2, by_=py+r+3;
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx_,by_,bw,bh);
        const pct = Math.max(0,Math.min(100,stamina||0))/100;
        ctx.fillStyle = pct>0.5 ? '#22c55e' : pct>0.25 ? '#f59e0b' : '#ef4444';
        ctx.fillRect(bx_,by_,bw*pct,bh);
    }

    // Click on canvas — handle Rematch button inside game-over panel
    canvas.addEventListener('click', function(e) {
        if (!gameOverState) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
        const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
        const W = canvas.width, H = canvas.height;
        const pw = 460, ph = 290;
        const py_ = (H - ph) / 2;
        const bw = 170, bh = 42;
        const btnX = W / 2 - bw / 2, btnY = py_ + ph - 52;
        if (mx >= btnX && mx <= btnX + bw && my >= btnY && my <= btnY + bh) {
            gameOverState = null;
            initSimulation();
        }
    });

    // Initial field preview
    (function() {
        ctx.fillStyle='#1b4332'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle='rgba(255,255,255,0.25)';
        ctx.font='bold 18px Inter,sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Press Kick Off to start', canvas.width/2, canvas.height/2);
    })();
</script>
